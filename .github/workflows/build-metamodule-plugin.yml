name: Build and release MetaModule plugin

on:
  workflow_dispatch:
    inputs:
      SDK_branch:
        description: 'MetaModule SDK branch'
        required: true
        type: choice
        default: main
        options:
          - main
      do_release:
        description: 'Create Release (must also select Tag above!)'
        required: true
        default: false
        type: boolean

jobs:
  build-lin:
    strategy:
      matrix:
        gcc: ['12.3.Rel1']
    name: "Build MetaModule plugin"
    runs-on: ubuntu-24.04
    steps:
      - name: Install Arm GNU Toolchain (arm-none-eabi-gcc)
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: ${{ matrix.gcc }}

      - name: Install cmake
        uses: jwlawson/actions-setup-cmake@v1.13
        with:
          cmake-version: '3.26.x'

      - name: Git setup
        run: git config --global --add safe.directory '*'

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install ninja-build

      - name: Set Release Version
        if: startsWith(github.ref, 'refs/tags/')
        uses: FranzDiebold/github-env-vars-action@v2

      - name: Build
        run: |
          mkdir -p ${{ github.workspace }}/metamodule-plugins
          git clone -b ${{ inputs.SDK_branch }} https://github.com/4ms/metamodule-plugin-sdk --recursive ${{ github.workspace }}/metamodule-plugin-sdk
          cmake -B build -G Ninja -DMETAMODULE_SDK_DIR=${{ github.workspace }}/metamodule-plugin-sdk
          cmake --build build
          cd ${{ github.workspace }}/metamodule-plugins
          for f in *.mmplugin; do
            mv "$f" "Submit-v2.1.mmplugin"
          done

      - name: Release
        if: startsWith(github.ref, 'refs/tags/') && inputs.do_release
        uses: softprops/action-gh-release@v2
        with:
          name: "Submit MetaModule ${{ env.CI_REF_NAME }}"
          files: |
            metamodule-plugins/*.mmplugin
